<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080b12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>GOLEM.EXE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg:#080b12;--panel:#0c1020;--panel2:#101828;--border:#1a2540;
      --accent:#00e5ff;--accent2:#ff6b35;--gold:#ffd700;--hp:#22c55e;
      --danger:#ef4444;--text:#c8d8f0;--muted:#4a5a7a;
      --glow:0 0 12px rgba(0,229,255,0.35);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --hud-h:52px;--tabs-h:38px;--drawer-h:228px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;touch-action:none;}
    #app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}

    /* HUD TOP */
    #hud-top{flex-shrink:0;height:var(--hud-h);background:var(--panel);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 12px;gap:8px;}
    #hud-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--accent);letter-spacing:2px;text-shadow:var(--glow);white-space:nowrap;}
    #hud-wave{text-align:center;font-size:11px;color:var(--gold);white-space:nowrap;}
    #hud-wave span{font-family:'Orbitron',sans-serif;font-weight:700;}
    #hud-score{text-align:right;font-size:10px;color:var(--muted);}
    #hud-score b{color:var(--accent2);font-size:12px;display:block;}

    /* CANVAS ZONE */
    #canvas-zone{flex:1;position:relative;overflow:hidden;background:#060911;min-height:0;}
    #gameCanvas{display:block;image-rendering:pixelated;width:100%;height:100%;}

    /* BARS OVERLAY */
    #bars-overlay{position:absolute;top:6px;left:6px;pointer-events:none;display:flex;flex-direction:column;gap:3px;}
    .bar-row{display:flex;align-items:center;gap:5px;}
    .bar-lbl{font-size:9px;color:var(--muted);width:18px;text-align:right;}
    .bar-track{width:100px;height:7px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:2px;transition:width 0.2s;}
    .bar-hp .bar-fill{background:var(--hp);box-shadow:0 0 5px var(--hp);}
    .bar-mp .bar-fill{background:var(--accent);box-shadow:0 0 5px var(--accent);}
    .bar-xp .bar-fill{background:var(--gold);}
    .bar-txt{font-size:9px;color:var(--text);min-width:46px;}

    /* STATE BADGE */
    #state-badge{position:absolute;top:6px;right:6px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;padding:3px 7px;border-radius:10px;border:1px solid currentColor;pointer-events:none;letter-spacing:1px;transition:color .3s,border-color .3s,background .3s;}

    /* COMBAT LOG */
    #combat-log{position:absolute;bottom:6px;left:6px;right:6px;max-height:58px;overflow:hidden;pointer-events:none;}
    .log-line{font-size:9px;line-height:1.55;opacity:.88;animation:fadeIn .25s ease;text-shadow:0 1px 3px rgba(0,0,0,.9);}
    .log-dmg{color:var(--accent2)}.log-heal{color:var(--hp)}.log-loot{color:var(--gold)}.log-spell{color:var(--accent)}.log-warn{color:var(--danger)}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-3px)}}

    /* WAVE NOTIF */
    #wave-notif{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);text-shadow:0 0 24px var(--accent),0 0 48px rgba(0,229,255,.25);pointer-events:none;opacity:0;letter-spacing:3px;white-space:nowrap;}

    /* FLOAT NUMBERS */
    .float-number{position:absolute;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;pointer-events:none;animation:floatUp 1.1s ease forwards;}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-26px) scale(1.1)}100%{opacity:0;transform:translateY(-44px) scale(.8)}}

    /* STATS STRIP */
    #stats-strip{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:6px 10px;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
    .sstat{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;padding:4px 2px;}
    .sstat-lbl{font-size:8px;color:var(--muted);letter-spacing:.5px;}
    .sstat-val{font-size:12px;color:var(--accent);font-weight:bold;margin-top:1px;}

    /* GOLD */
    #gold-chip{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;}
    #gold-val{font-family:'Orbitron',sans-serif;font-size:15px;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.4);}
    #gold-lbl{font-size:9px;color:var(--muted);}

    /* TABS */
    #tabs{flex-shrink:0;display:flex;background:var(--panel2);border-top:1px solid var(--border);height:var(--tabs-h);}
    .tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:color .2s,border-color .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0 4px;}
    .tab-btn .tab-icon{font-size:15px;line-height:1;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-btn:active{background:rgba(0,229,255,.06);}

    /* DRAWER */
    #drawer{flex-shrink:0;height:var(--drawer-h);background:var(--panel2);overflow:hidden;position:relative;}
    .drawer-panel{position:absolute;inset:0;padding:10px 12px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .18s ease;}
    .drawer-panel.active{opacity:1;pointer-events:auto;}
    .panel-title{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}

    /* INVENTORY */
    #inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;}
    .inv-item{aspect-ratio:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;cursor:pointer;transition:border-color .15s,background .15s;}
    .inv-item:active{background:rgba(0,229,255,.08);}
    .inv-item.common{border-color:#3a3a4a}.inv-item.uncommon{border-color:#22c55e}
    .inv-item.rare{border-color:#3b82f6;box-shadow:0 0 5px rgba(59,130,246,.3)}
    .inv-item.epic{border-color:#a855f7;box-shadow:0 0 7px rgba(168,85,247,.4)}
    .rarity-dot{position:absolute;bottom:2px;right:2px;width:4px;height:4px;border-radius:50%;}
    .common .rarity-dot{background:#666}.uncommon .rarity-dot{background:#22c55e}.rare .rarity-dot{background:#3b82f6}.epic .rarity-dot{background:#a855f7}
    #sell-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:background .2s;}
    #sell-btn:active{background:rgba(255,107,53,.15);}

    /* EQUIP */
    .equip-grid{display:grid;grid-template-areas:". head ." "arm1 body arm2" ". belt ." ". boots .";grid-template-columns:1fr 1fr 1fr;gap:5px;max-width:180px;margin:0 auto;}
    .eq-slot{aspect-ratio:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:border-color .15s;position:relative;}
    .eq-slot:active{border-color:var(--accent)}.eq-slot.filled{border-color:var(--gold);background:rgba(255,215,0,.05)}
    .eq-lbl{font-size:7px;color:var(--muted);margin-top:1px;}
    .eq-slot[data-slot="head"]{grid-area:head}.eq-slot[data-slot="body"]{grid-area:body}
    .eq-slot[data-slot="arm1"]{grid-area:arm1}.eq-slot[data-slot="arm2"]{grid-area:arm2}
    .eq-slot[data-slot="belt"]{grid-area:belt}.eq-slot[data-slot="boots"]{grid-area:boots}

    /* SPELLS */
    #spells-list{display:flex;flex-direction:column;gap:5px;}
    .spell-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;padding:6px 8px;}
    .spell-ico{font-size:18px}.spell-info{flex:1}.spell-name{font-size:11px;color:var(--accent)}.spell-desc{font-size:9px;color:var(--muted)}.spell-cd{font-size:9px;color:var(--gold);min-width:36px;text-align:right;}

    /* TOAST */
    #item-toast{position:fixed;bottom:calc(var(--drawer-h) + var(--tabs-h) + 8px);left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);border-radius:6px;padding:8px 12px;font-size:11px;max-width:240px;text-align:center;box-shadow:var(--glow);pointer-events:none;opacity:0;transition:opacity .2s;z-index:99;}
    #item-toast.show{opacity:1}
    #item-toast .tt-name{color:var(--accent);font-size:12px;margin-bottom:3px}
    #item-toast .tt-rarity{font-size:9px;margin-top:3px}
    #item-toast .tt-rarity.common{color:#888}.tt-rarity.uncommon{color:#22c55e}.tt-rarity.rare{color:#3b82f6}.tt-rarity.epic{color:#a855f7}

    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
<div id="app">
  <div id="hud-top">
    <div id="hud-title">⬡ GOLEM</div>
    <div id="hud-wave">VAGUE <span id="wave-num">1</span> · <span id="enemy-count">0</span> ☠</div>
    <div id="hud-score"><span id="score-val">0</span><b>SCORE</b></div>
  </div>

  <div id="canvas-zone">
    <canvas id="gameCanvas"></canvas>
    <div id="bars-overlay">
      <div class="bar-row"><div class="bar-lbl">HP</div><div class="bar-track bar-hp"><div class="bar-fill" id="bar-hp" style="width:100%"></div></div><div class="bar-txt" id="val-hp">100/100</div></div>
      <div class="bar-row"><div class="bar-lbl">MP</div><div class="bar-track bar-mp"><div class="bar-fill" id="bar-mp" style="width:100%"></div></div><div class="bar-txt" id="val-mp">50/50</div></div>
      <div class="bar-row"><div class="bar-lbl">XP</div><div class="bar-track bar-xp"><div class="bar-fill" id="bar-xp" style="width:0%"></div></div><div class="bar-txt" id="val-xp">LVL 1</div></div>
    </div>
    <div id="state-badge">PATROL</div>
    <div id="combat-log"></div>
    <div id="wave-notif"></div>
  </div>

  <div id="stats-strip">
    <div class="sstat"><div class="sstat-lbl">STR</div><div class="sstat-val" id="s-str">10</div></div>
    <div class="sstat"><div class="sstat-lbl">INT</div><div class="sstat-val" id="s-int">8</div></div>
    <div class="sstat"><div class="sstat-lbl">SPD</div><div class="sstat-val" id="s-spd">5</div></div>
    <div class="sstat"><div class="sstat-lbl">DEF</div><div class="sstat-val" id="s-def">3</div></div>
    <div class="sstat"><div class="sstat-lbl">ATK</div><div class="sstat-val" id="s-atk">12</div></div>
    <div class="sstat"><div class="sstat-lbl">CRIT</div><div class="sstat-val" id="s-crit">5%</div></div>
  </div>

  <div id="gold-chip">
    <div id="gold-lbl">⬡ GOLD</div>
    <div id="gold-val">0 G</div>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-tab="inventory"><span class="tab-icon">🎒</span>SACS</button>
    <button class="tab-btn" data-tab="equip"><span class="tab-icon">⚔️</span>ÉQUIP</button>
    <button class="tab-btn" data-tab="spells"><span class="tab-icon">✨</span>SORTS</button>
  </div>

  <div id="drawer">
    <div class="drawer-panel active" id="panel-inventory">
      <div class="panel-title">⬡ Inventaire</div>
      <div id="inv-grid"></div>
      <button id="sell-btn">⟳ AUTO-VENTE COMMUNS</button>
    </div>
    <div class="drawer-panel" id="panel-equip">
      <div class="panel-title">⬡ Équipement</div>
      <div class="equip-grid">
        <div class="eq-slot" data-slot="head">⬡<div class="eq-lbl">TÊTE</div></div>
        <div class="eq-slot" data-slot="body">⬡<div class="eq-lbl">CORPS</div></div>
        <div class="eq-slot" data-slot="arm1">⬡<div class="eq-lbl">BRAS G</div></div>
        <div class="eq-slot" data-slot="arm2">⬡<div class="eq-lbl">BRAS D</div></div>
        <div class="eq-slot" data-slot="belt">⬡<div class="eq-lbl">CEIN.</div></div>
        <div class="eq-slot" data-slot="boots">⬡<div class="eq-lbl">BOTTES</div></div>
      </div>
    </div>
    <div class="drawer-panel" id="panel-spells">
      <div class="panel-title">⬡ Sorts</div>
      <div id="spells-list">
        <div class="spell-row"><div class="spell-ico">🔩</div><div class="spell-info"><div class="spell-name">Frappe Basique</div><div class="spell-desc">Auto-attaque physique</div></div><div class="spell-cd">PASSIF</div></div>
      </div>
    </div>
  </div>
</div>

<div id="item-toast"><div class="tt-name" id="tt-name"></div><div id="tt-stats"></div><div class="tt-rarity" id="tt-rarity"></div></div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const canvasZone=document.getElementById('canvas-zone');

function resizeCanvas(){canvas.width=canvasZone.clientWidth;canvas.height=canvasZone.clientHeight;}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

const ISO={
  tileW:48,tileH:24,cols:16,rows:16,
  toScreen(c,r){return{x:canvas.width/2+(c-r)*this.tileW/2,y:canvas.height*.18+(c+r)*this.tileH/2};}
};
const C={
  golem:{body:'#4a7aff',core:'#00e5ff',joint:'#1a3a8f'},
  grunt:{body:'#c0392b',eye:'#ff6b35'},
  brute:{body:'#7d3c98',eye:'#e74c3c'},
  slime:{body:'#27ae60',eye:'#a9dfbf'},
  tile:{a:'#0d1f3a',b:'#101e38',line:'#182038'},
};

const state={
  golem:{col:8,row:8,hp:100,maxHp:100,mp:50,maxMp:50,xp:0,xpNext:100,level:1,str:10,int:8,spd:5,def:3,atkDmg:12,atkSpd:1.2,critChance:5,atkTimer:0,atkRange:1.6,gold:0,gstate:'patrol',fleeTimer:0,target:null,patrol:{col:8,row:8},patrolTimer:0,facing:1,animFrame:0,animTimer:0,hitFlash:0,equipped:{head:null,body:null,arm1:null,arm2:null,belt:null,boots:null}},
  enemies:[],particles:[],inventory:[],
  spells:[{id:'basic',name:'Frappe Basique',icon:'🔩',desc:'Auto-attaque',passive:true}],
  wave:1,score:0,waveTimer:3,waveDelay:5,waveActive:false,totalKills:0,
};

const ETYPES={
  grunt:{hp:30,dmg:5,spd:.9,range:1.2,xp:15,gold:3,threat:1,name:'Grunt',draw:drawGrunt},
  brute:{hp:80,dmg:14,spd:.55,range:1.5,xp:40,gold:8,threat:3,name:'Brute',draw:drawBrute},
  slime:{hp:20,dmg:3,spd:1.1,range:1.0,xp:10,gold:2,threat:1,name:'Slime',draw:drawSlime},
};
const ITEMS=[
  {id:'h1',name:'Heaume de Fer',icon:'⛑️',slot:'head',rarity:'common',stats:{def:2}},
  {id:'b1',name:'Armure de Pierre',icon:'🪨',slot:'body',rarity:'common',stats:{def:4,str:1}},
  {id:'a1',name:'Gants Tranchants',icon:'🥊',slot:'arm1',rarity:'uncommon',stats:{str:3,atk:4}},
  {id:'w1',name:'Ceinture Rapide',icon:'🎗️',slot:'belt',rarity:'uncommon',stats:{spd:2}},
  {id:'f1',name:'Bottes Agiles',icon:'👟',slot:'boots',rarity:'rare',stats:{spd:4,def:1}},
  {id:'s1',name:'Épée Runique',icon:'⚔️',slot:'arm2',rarity:'rare',stats:{str:6,atk:8,crit:5}},
  {id:'c1',name:'Couronne Mage',icon:'👑',slot:'head',rarity:'epic',stats:{int:10,mp:20}},
];
const RW={common:55,uncommon:28,rare:13,epic:4};

function dist(a,b){return Math.sqrt((a.col-b.col)**2+(a.row-b.row)**2);}
function spawnParticles(x,y,n,color,spd=2,life=.6){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd+.5;state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,size:Math.random()*3+1});}}
function spawnFloat(x,y,text,color){const el=document.createElement('div');el.className='float-number';el.style.cssText=`left:${x}px;top:${y}px;color:${color};`;el.textContent=text;canvasZone.appendChild(el);setTimeout(()=>el.remove(),1150);}

const logEl=document.getElementById('combat-log');
const logLines=[];
function addLog(msg,cls=''){logLines.push({msg,cls});if(logLines.length>5)logLines.shift();logEl.innerHTML=logLines.map(l=>`<div class="log-line ${l.cls}">${l.msg}</div>`).join('');}

const styleEl=document.createElement('style');
styleEl.textContent='@keyframes waveFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}';
document.head.appendChild(styleEl);

function showWaveNotif(t){const el=document.getElementById('wave-notif');el.textContent=t;el.style.animation='none';el.offsetHeight;el.style.animation='waveFlash 2s ease forwards';}

function spawnWave(wave){
  const count=3+wave*2;
  const tl=['grunt','grunt','slime','brute'];
  for(let i=0;i<count;i++){
    const type=tl[Math.min(Math.floor(Math.random()*(1+wave*.4)),tl.length-1)];
    const t=ETYPES[type];
    let col,row;const edge=Math.floor(Math.random()*4);
    if(edge===0){col=0;row=Math.random()*ISO.rows;}else if(edge===1){col=ISO.cols-1;row=Math.random()*ISO.rows;}else if(edge===2){col=Math.random()*ISO.cols;row=0;}else{col=Math.random()*ISO.cols;row=ISO.rows-1;}
    const sc=1+wave*.08;
    state.enemies.push({id:Date.now()+i,type,col,row,hp:Math.floor(t.hp*sc),maxHp:Math.floor(t.hp*sc),dmg:Math.floor(t.dmg*sc),spd:t.spd,range:t.range,xp:t.xp,gold:t.gold,threat:t.threat,name:t.name,atkTimer:Math.random()*2,hitFlash:0,animTimer:0,animFrame:0,draw:t.draw,facing:1});
  }
  state.waveActive=true;showWaveNotif(`VAGUE ${wave}`);addLog(`⚡ Vague ${wave} — ${count} ennemis!`,'log-warn');
}

function updateGolem(dt){
  const G=state.golem;
  G.animTimer+=dt;if(G.animTimer>.25){G.animTimer=0;G.animFrame=(G.animFrame+1)%4;}
  if(G.hitFlash>0)G.hitFlash-=dt*3;
  const nearby=state.enemies.filter(e=>dist(G,e)<4);
  const threat=nearby.reduce((s,e)=>s+e.threat,0);
  const closest=nearby.sort((a,b)=>dist(G,a)-dist(G,b))[0];
  if(G.hp<G.maxHp*.3&&threat>=3){G.gstate='flee';G.fleeTimer=3;}
  if(G.gstate==='flee'){G.fleeTimer-=dt;if(G.fleeTimer<=0||threat===0)G.gstate='patrol';if(closest)fleeFrom(G,closest,dt);G.hp=Math.min(G.maxHp,G.hp+dt*2);}
  else if(threat===0){G.gstate='patrol';patrolBehavior(G,dt);G.hp=Math.min(G.maxHp,G.hp+dt*1.5);}
  else if(closest&&dist(G,closest)<=G.atkRange){G.gstate='attack';G.target=closest;attackBehavior(G,closest,dt);}
  else if(closest){if(threat<=4){G.gstate='chase';chaseTo(G,closest,dt);}else{G.gstate='flee';G.fleeTimer=2;fleeFrom(G,closest,dt);}}
  G.atkTimer=Math.max(0,G.atkTimer-dt);
  G.col=Math.max(.3,Math.min(ISO.cols-.3,G.col));G.row=Math.max(.3,Math.min(ISO.rows-.3,G.row));
  const badge=document.getElementById('state-badge');
  const sc2={patrol:'#4a7aff',chase:'#ffd700',flee:'#ef4444',attack:'#ff6b35'};
  const labels={patrol:'PATROL',chase:'CHASSE',flee:'FUITE',attack:'ATTAQUE'};
  badge.textContent=labels[G.gstate]||G.gstate;badge.style.color=sc2[G.gstate];badge.style.borderColor=sc2[G.gstate];badge.style.background=sc2[G.gstate]+'18';
}

function chaseTo(G,t,dt){const d=dist(G,t);if(d<.1)return;const s=(0.8+G.spd*.08)*dt,f=Math.min(s/d,1);const dc=(t.col-G.col)*f,dr=(t.row-G.row)*f;G.col+=dc;G.row+=dr;if(dc!==0)G.facing=dc>0?1:-1;}
function fleeFrom(G,t,dt){const d=dist(G,t);if(d<.1)return;const s=(1+G.spd*.1)*dt,f=s/d;G.col-=(t.col-G.col)*f;G.row-=(t.row-G.row)*f;G.col+=(8-G.col)*.02;G.row+=(8-G.row)*.02;}
function patrolBehavior(G,dt){G.patrolTimer-=dt;if(G.patrolTimer<=0){G.patrol.col=2+Math.random()*(ISO.cols-4);G.patrol.row=2+Math.random()*(ISO.rows-4);G.patrolTimer=3+Math.random()*4;}const d=dist(G,G.patrol);if(d>.3){const s=.4*dt,f=Math.min(s/d,1);const dc=(G.patrol.col-G.col)*f,dr=(G.patrol.row-G.row)*f;G.col+=dc;G.row+=dr;if(dc!==0)G.facing=dc>0?1:-1;}}
function attackBehavior(G,enemy,dt){if(G.atkTimer<=0){G.facing=enemy.col>G.col?1:-1;let dmg=G.atkDmg+Math.floor(G.str*.8);const crit=Math.random()*100<G.critChance;if(crit)dmg=Math.floor(dmg*1.8);enemy.hp-=dmg;enemy.hitFlash=1;const p=ISO.toScreen(enemy.col,enemy.row);spawnFloat(p.x,p.y-20,crit?`⚡${dmg}!`:`-${dmg}`,crit?'#ffd700':'#ff6b35');spawnParticles(p.x,p.y,crit?10:5,'#ff6b35',3);if(crit)addLog(`⚡ CRITIQUE! ${enemy.name} ${dmg}`,'log-dmg');G.atkTimer=1/G.atkSpd;if(enemy.hp<=0)killEnemy(enemy);}}
function killEnemy(enemy){const p=ISO.toScreen(enemy.col,enemy.row);spawnParticles(p.x,p.y,15,'#ff6b35',4,.8);spawnParticles(p.x,p.y,8,'#ffd700',3,.6);state.golem.xp+=enemy.xp;state.golem.gold+=enemy.gold;state.score+=enemy.xp*2;state.totalKills++;addLog(`💀 ${enemy.name} +${enemy.xp}XP +${enemy.gold}G`,'log-loot');if(Math.random()<.25)dropItem(p.x,p.y);state.enemies=state.enemies.filter(e=>e!==enemy);checkLevelUp();updateUI();}
function checkLevelUp(){const G=state.golem;if(G.xp>=G.xpNext){G.level++;G.xp-=G.xpNext;G.xpNext=Math.floor(G.xpNext*1.5);G.maxHp+=15;G.hp=G.maxHp;G.str+=2;G.int+=1;G.def+=1;G.spd+=.3;G.atkDmg+=3;G.atkSpd+=.05;addLog(`✨ NIVEAU ${G.level}!`,'log-spell');const p=ISO.toScreen(G.col,G.row);spawnParticles(p.x,p.y,20,'#00e5ff',4,1);spawnFloat(p.x,p.y-30,`LVL ${G.level}!`,'#00e5ff');}}

function updateEnemies(dt){
  const G=state.golem;
  for(const e of state.enemies){
    e.animTimer+=dt;e.atkTimer-=dt;if(e.animTimer>.3){e.animTimer=0;e.animFrame=(e.animFrame+1)%4;}if(e.hitFlash>0)e.hitFlash-=dt*4;
    const d=dist(e,G);
    if(d>e.range){const s=e.spd*dt,f=Math.min(s/d,1);const dc=(G.col-e.col)*f,dr=(G.row-e.row)*f;e.col+=dc;e.row+=dr;e.facing=dc>0?1:-1;}
    else{e.facing=G.col>e.col?1:-1;if(e.atkTimer<=0){const dmg=Math.max(1,e.dmg-G.def);G.hp-=dmg;G.hitFlash=1;e.atkTimer=1.2/e.spd;const p=ISO.toScreen(G.col,G.row);spawnFloat(p.x,p.y-15,`-${dmg}`,'#ef4444');spawnParticles(p.x,p.y,4,'#ef4444',2);if(G.hp<=0){G.hp=0;handleDeath();}}}
  }
}
function handleDeath(){addLog('💔 Golem tombé… 3s','log-warn');setTimeout(()=>{state.golem.hp=state.golem.maxHp*.5;state.golem.col=8;state.golem.row=8;state.enemies=[];addLog('⚡ Golem ressuscité!','log-spell');},3000);}

function dropItem(x,y){const roll=Math.random()*100;let rarity='common',acc=0;for(const[r,w]of Object.entries(RW)){acc+=w;if(roll<acc){rarity=r;break;}}const pool=ITEMS.filter(i=>i.rarity===rarity);if(!pool.length)return;const tmpl=pool[Math.floor(Math.random()*pool.length)];if(state.inventory.length<24){state.inventory.push({...tmpl,uid:Date.now()+Math.random()});addLog(`📦 ${tmpl.name} (${rarity})`,'log-loot');spawnFloat(x,y-20,tmpl.icon,'#ffd700');}renderInventory();}

function updateParticles(dt){for(let i=state.particles.length-1;i>=0;i--){const p=state.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=dt;if(p.life<=0)state.particles.splice(i,1);}}

function drawShadow(x,y,r=14){ctx.save();ctx.globalAlpha=.3;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x,y+3,r,r*.4,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawHpBar(x,y,hp,max,w=28){const h=3.5,frac=Math.max(0,hp/max),col=frac>.5?'#22c55e':frac>.25?'#f59e0b':'#ef4444';ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(x-w/2,y-h-1,w,h);ctx.fillStyle=col;ctx.fillRect(x-w/2,y-h-1,w*frac,h);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;ctx.strokeRect(x-w/2,y-h-1,w,h);}

function drawGolem(x,y){
  const G=state.golem;const bob=Math.sin(G.animFrame*Math.PI*.5)*1.2;const flash=G.hitFlash>0;
  ctx.save();ctx.translate(x,y+bob);
  const sc={patrol:'#4a7aff',chase:'#ffd700',flee:'#ef4444',attack:'#ff6b35'};
  ctx.beginPath();ctx.arc(0,-22,16,0,Math.PI*2);ctx.strokeStyle=(sc[G.gstate]||'#fff')+'44';ctx.lineWidth=1.5;ctx.stroke();
  if(flash){ctx.globalAlpha=.5+G.hitFlash*.5;ctx.globalCompositeOperation='lighter';}
  drawShadow(0,6);
  ctx.fillStyle=C.golem.body;ctx.fillRect(-8,-16,16,17);
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(-6,-14,6,8);
  ctx.fillStyle=C.golem.core;ctx.fillRect(-4,-11,8,8);
  ctx.globalAlpha=flash?.5:.55+Math.sin(Date.now()*.003)*.2;ctx.fillStyle='rgba(0,229,255,.45)';ctx.fillRect(-3,-10,6,6);ctx.globalAlpha=flash?.5:1;
  ctx.fillStyle=C.golem.body;ctx.fillRect(-6,-25,12,10);ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(-5,-24,5,4);
  ctx.fillStyle=C.golem.core;ctx.globalAlpha=flash?1:.7+Math.sin(Date.now()*.004)*.3;ctx.fillRect(-4,-20,3,3);ctx.fillRect(1,-20,3,3);ctx.globalAlpha=1;
  const sw=Math.sin(G.animFrame*Math.PI*.5)*1.5;ctx.fillStyle=C.golem.joint;ctx.fillRect(-12,-14+sw,5,11);ctx.fillRect(7,-14-sw,5,11);
  ctx.fillRect(-6,-1,3,5);ctx.fillRect(3,-1,3,5);ctx.fillStyle='#2a5acc';
  ctx.fillRect(-7,3+(G.animFrame%2===0?1:0),5,3);ctx.fillRect(2,3+(G.animFrame%2===0?0:1),5,3);
  ctx.restore();drawHpBar(x,y-32,G.hp,G.maxHp,36);
}

function drawGrunt(cx,x,y,e){
  const bob=Math.sin(e.animFrame*Math.PI*.5)*1.2;cx.save();cx.translate(x,y+bob);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  cx.restore();cx.save();cx.translate(x,y+bob);
  cx.fillStyle=C.grunt.body;cx.fillRect(-7,-17,14,17);
  cx.fillStyle='#8b1a10';cx.fillRect(-5,-15,5,7);
  cx.fillStyle=C.grunt.eye;cx.globalAlpha=.8+Math.sin(Date.now()*.006)*.2;cx.fillRect(-4,-13,2.5,2.5);cx.fillRect(1,-13,2.5,2.5);cx.globalAlpha=1;
  cx.fillStyle='#7a1208';cx.fillRect(-6,-1+(e.animFrame%2===0?1:0),4,4);cx.fillRect(2,-1+(e.animFrame%2===0?0:1),4,4);
  cx.restore();drawHpBar(x,y-25,e.hp,e.maxHp,28);
}

function drawBrute(cx,x,y,e){
  const bob=Math.sin(e.animFrame*Math.PI*.5)*.8;cx.save();cx.translate(x,y+bob);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  cx.fillStyle=C.brute.body;cx.fillRect(-11,-22,22,21);cx.fillStyle='#5a2880';cx.fillRect(-9,-20,9,10);
  cx.fillStyle=C.brute.eye;cx.globalAlpha=.9+Math.sin(Date.now()*.005)*.1;cx.fillRect(-7,-16,4,4);cx.fillRect(3,-16,4,4);cx.globalAlpha=1;
  cx.fillStyle='#4a1a70';cx.fillRect(-13,-16,4,14);cx.fillRect(9,-16,4,14);cx.fillRect(-8,-1+(e.animFrame%2===0?2:0),5,6);cx.fillRect(3,-1+(e.animFrame%2===0?0:2),5,6);
  cx.restore();drawHpBar(x,y-32,e.hp,e.maxHp,36);
}

function drawSlime(cx,x,y,e){
  const sq=.85+Math.sin(e.animFrame*Math.PI*.5)*.15;cx.save();cx.translate(x,y);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  cx.scale(1,sq);cx.fillStyle=C.slime.body;cx.beginPath();cx.ellipse(0,-6,10,8,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,.15)';cx.beginPath();cx.ellipse(-2,-9,4,2.5,-.3,0,Math.PI*2);cx.fill();
  cx.fillStyle=C.slime.eye;cx.fillRect(-4,-8,2.5,2.5);cx.fillRect(1,-8,2.5,2.5);
  cx.restore();drawHpBar(x,y-20,e.hp,e.maxHp,24);
}

function drawGrid(){for(let c=0;c<ISO.cols;c++){for(let r=0;r<ISO.rows;r++){const{x,y}=ISO.toScreen(c,r);const tw=ISO.tileW/2,th=ISO.tileH/2;ctx.beginPath();ctx.moveTo(x,y-th);ctx.lineTo(x+tw,y);ctx.lineTo(x,y+th);ctx.lineTo(x-tw,y);ctx.closePath();ctx.fillStyle=(c+r)%2===0?C.tile.a:C.tile.b;ctx.fill();ctx.strokeStyle=C.tile.line;ctx.lineWidth=.5;ctx.stroke();}}}
function drawParticles(){for(const p of state.particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}ctx.globalAlpha=1;}
function drawScene(){ctx.clearRect(0,0,canvas.width,canvas.height);drawGrid();const G=state.golem;const sprites=[];const gp=ISO.toScreen(G.col,G.row);sprites.push({d:G.col+G.row,fn:()=>drawGolem(gp.x,gp.y)});for(const e of state.enemies){const p=ISO.toScreen(e.col,e.row);sprites.push({d:e.col+e.row,fn:()=>e.draw(ctx,p.x,p.y,e)});}sprites.sort((a,b)=>a.d-b.d);for(const s of sprites)s.fn();drawParticles();}

function updateUI(){
  const G=state.golem;
  document.getElementById('bar-hp').style.width=(G.hp/G.maxHp*100)+'%';document.getElementById('val-hp').textContent=Math.ceil(G.hp)+'/'+G.maxHp;
  document.getElementById('bar-mp').style.width=(G.mp/G.maxMp*100)+'%';document.getElementById('val-mp').textContent=G.mp+'/'+G.maxMp;
  document.getElementById('bar-xp').style.width=(G.xp/G.xpNext*100)+'%';document.getElementById('val-xp').textContent='LVL '+G.level;
  document.getElementById('gold-val').textContent=G.gold+' G';
  document.getElementById('wave-num').textContent=state.wave;document.getElementById('enemy-count').textContent=state.enemies.length;
  document.getElementById('score-val').textContent=state.score.toLocaleString();
  document.getElementById('s-str').textContent=G.str;document.getElementById('s-int').textContent=G.int;
  document.getElementById('s-spd').textContent=G.spd.toFixed(1);document.getElementById('s-def').textContent=G.def;
  document.getElementById('s-atk').textContent=G.atkDmg;document.getElementById('s-crit').textContent=G.critChance+'%';
}

function renderInventory(){
  const grid=document.getElementById('inv-grid');let html='';
  for(let i=0;i<24;i++){const item=state.inventory[i];if(item){html+=`<div class="inv-item ${item.rarity}" data-idx="${i}">${item.icon}<div class="rarity-dot"></div></div>`;}else{html+='<div class="inv-item"></div>';}}
  grid.innerHTML=html;
  grid.querySelectorAll('.inv-item[data-idx]').forEach(el=>{const item=state.inventory[+el.dataset.idx];if(!item)return;el.addEventListener('click',()=>showToast(item));});
}

let toastTimer=null;
function showToast(item){
  const t=document.getElementById('item-toast');
  document.getElementById('tt-name').textContent=item.name;
  document.getElementById('tt-stats').textContent=Object.entries(item.stats).map(([k,v])=>k.toUpperCase()+': +'+v).join(' · ');
  const ttR=document.getElementById('tt-rarity');ttR.textContent=item.rarity.toUpperCase();ttR.className='tt-rarity '+item.rarity;
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('sell-btn').addEventListener('click',()=>{
  const sold=state.inventory.filter(i=>i.rarity==='common');const g=sold.length*2;
  state.inventory=state.inventory.filter(i=>i.rarity!=='common');state.golem.gold+=g;
  addLog('💰 '+sold.length+' communs → +'+g+' G','log-loot');renderInventory();updateUI();
});

document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.drawer-panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('panel-'+btn.dataset.tab).classList.add('active');});});

let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  if(!state.waveActive||state.enemies.length===0){if(state.waveActive&&state.enemies.length===0){state.waveActive=false;state.waveTimer=state.waveDelay;addLog('✅ Vague '+state.wave+' terminée!','log-spell');state.wave++;}state.waveTimer-=dt;if(state.waveTimer<=0&&!state.waveActive)spawnWave(state.wave);}
  if(state.golem.hp>0){updateGolem(dt);updateEnemies(dt);}
  updateParticles(dt);drawScene();
  if(Math.floor(ts/100)!==Math.floor((ts-dt*1000)/100))updateUI();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('beforeunload',()=>{localStorage.setItem('golemExeSave',JSON.stringify({golem:{hp:state.golem.hp,maxHp:state.golem.maxHp,level:state.golem.level,xp:state.golem.xp,xpNext:state.golem.xpNext,gold:state.golem.gold,str:state.golem.str,int:state.golem.int,spd:state.golem.spd,def:state.golem.def,atkDmg:state.golem.atkDmg,critChance:state.golem.critChance,atkSpd:state.golem.atkSpd},wave:state.wave,score:state.score,inventory:state.inventory}));});
const sv=localStorage.getItem('golemExeSave');if(sv){try{const s=JSON.parse(sv);Object.assign(state.golem,s.golem);state.wave=s.wave||1;state.score=s.score||0;state.inventory=s.inventory||[];addLog('💾 Partie chargée!','log-spell');renderInventory();}catch(e){}}

function init(){resizeCanvas();renderInventory();updateUI();addLog('⬡ GOLEM.EXE — En ligne!','log-spell');requestAnimationFrame(ts=>{lastTime=ts;gameLoop(ts);});}
init();
</script>
</body>
</html>
