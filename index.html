<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#080b12"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <title>GOLEM.EXE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    :root{
      --bg:#080b12;--panel:#0c1020;--panel2:#0f1626;--border:#1a2540;
      --accent:#00e5ff;--accent2:#ff6b35;--gold:#ffd700;--hp:#22c55e;
      --danger:#ef4444;--purple:#a855f7;--text:#c8d8f0;--muted:#4a5a7a;
      --glow:0 0 12px rgba(0,229,255,0.35);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --hud-h:48px;--strips-h:88px;--handle-h:32px;
      --drawer-collapsed:0px;--drawer-expanded:240px;
      --drawer-h:var(--drawer-expanded);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;touch-action:none;}

    /* ── APP SHELL ── */
    #app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}

    /* ── HUD TOP ── */
    #hud-top{flex-shrink:0;height:var(--hud-h);background:var(--panel);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 10px;gap:6px;}
    #hud-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--accent);letter-spacing:2px;text-shadow:var(--glow);}
    #hud-wave{text-align:center;font-size:10px;color:var(--gold);white-space:nowrap;}
    #hud-wave span{font-family:'Orbitron',sans-serif;font-weight:700;}
    #hud-score{text-align:right;font-size:9px;color:var(--muted);}
    #hud-score b{color:var(--accent2);font-size:11px;display:block;}

    /* ── CANVAS ── */
    #canvas-zone{flex:1;position:relative;overflow:hidden;background:#060911;min-height:0;}
    #gameCanvas{display:block;image-rendering:pixelated;width:100%;height:100%;}

    /* bars overlay */
    #bars-overlay{position:absolute;top:6px;left:6px;pointer-events:none;display:flex;flex-direction:column;gap:3px;}
    .bar-row{display:flex;align-items:center;gap:4px;}
    .bar-lbl{font-size:8px;color:var(--muted);width:16px;text-align:right;}
    .bar-track{width:90px;height:6px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:2px;transition:width .2s;}
    .bar-hp .bar-fill{background:var(--hp);box-shadow:0 0 4px var(--hp);}
    .bar-mp .bar-fill{background:var(--accent);box-shadow:0 0 4px var(--accent);}
    .bar-xp .bar-fill{background:var(--gold);}
    .bar-txt{font-size:8px;color:var(--text);min-width:40px;}

    /* spell cooldown pips — bottom-left of canvas */
    #spell-pips{position:absolute;bottom:6px;left:6px;display:flex;gap:5px;pointer-events:none;}
    .spell-pip{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;position:relative;overflow:hidden;}
    .spell-pip .pip-cd{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);transition:width .1s linear;}
    .spell-pip.ready{border-color:var(--accent);box-shadow:0 0 6px rgba(0,229,255,.3);}
    .spell-pip.oncd{border-color:var(--muted);}
    .spell-pip .pip-lbl{font-size:7px;color:var(--muted);margin-top:1px;line-height:1;}

    /* state badge */
    #state-badge{position:absolute;top:6px;right:6px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;padding:3px 6px;border-radius:10px;border:1px solid currentColor;pointer-events:none;letter-spacing:1px;transition:color .3s,border-color .3s,background .3s;}

    /* combat log */
    #combat-log{position:absolute;bottom:6px;right:6px;width:180px;max-height:54px;overflow:hidden;pointer-events:none;text-align:right;}
    .log-line{font-size:8px;line-height:1.5;opacity:.9;animation:fadeIn .2s ease;text-shadow:0 1px 3px rgba(0,0,0,.95);}
    .log-dmg{color:var(--accent2)}.log-heal{color:var(--hp)}.log-loot{color:var(--gold)}.log-spell{color:var(--accent)}.log-warn{color:var(--danger)}
    @keyframes fadeIn{from{opacity:0;transform:translateX(4px)}}

    /* wave notif */
    #wave-notif{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--accent);text-shadow:0 0 20px var(--accent);pointer-events:none;opacity:0;letter-spacing:3px;white-space:nowrap;}

    /* float numbers */
    .float-number{position:absolute;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;pointer-events:none;animation:floatUp 1.1s ease forwards;}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-24px) scale(1.1)}100%{opacity:0;transform:translateY(-42px) scale(.8)}}

    /* ── BOTTOM FIXED PANEL ── */
    #bottom-panel{flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);}

    /* stats + gold row */
    #strips{height:var(--strips-h);border-top:1px solid var(--border);display:flex;flex-direction:column;}
    #stats-strip{flex:1;padding:5px 8px;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;align-items:center;}
    .sstat{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;padding:3px 2px;}
    .sstat-lbl{font-size:7px;color:var(--muted);}
    .sstat-val{font-size:11px;color:var(--accent);font-weight:bold;margin-top:1px;}
    #gold-row{padding:3px 10px 5px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
    #gold-val{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.4);}
    #gold-lbl{font-size:8px;color:var(--muted);}

    /* ── COLLAPSIBLE DRAWER ── */
    #drawer-wrap{flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;transition:height .35s cubic-bezier(.4,0,.2,1);}
    #drawer-wrap.collapsed{height:0 !important;}

    /* handle / drag bar */
    #drawer-handle{
      flex-shrink:0;height:var(--handle-h);
      background:var(--panel2);
      border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 12px;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    #drawer-handle:active{background:rgba(0,229,255,.05);}
    #handle-tabs{display:flex;gap:0;}
    .htab{
      padding:0 10px;height:100%;display:flex;align-items:center;
      font-size:10px;letter-spacing:1px;color:var(--muted);
      border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;
      gap:4px;
    }
    .htab .htab-icon{font-size:13px;}
    .htab.active{color:var(--accent);border-bottom-color:var(--accent);}
    #handle-toggle{
      font-size:14px;color:var(--muted);transition:transform .35s;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,.03);
    }
    #drawer-wrap:not(.collapsed) #handle-toggle{transform:rotate(180deg);}

    /* drawer content */
    #drawer-content{flex:1;position:relative;overflow:hidden;background:var(--panel2);}
    .drawer-panel{position:absolute;inset:0;padding:8px 10px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .18s;}
    .drawer-panel.active{opacity:1;pointer-events:auto;}
    .panel-title{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--accent);letter-spacing:2px;margin-bottom:7px;}

    /* inventory */
    #inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:7px;}
    .inv-item{aspect-ratio:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;cursor:pointer;transition:border-color .15s;}
    .inv-item:active{background:rgba(0,229,255,.08);}
    .inv-item.common{border-color:#3a3a4a}.inv-item.uncommon{border-color:#22c55e}
    .inv-item.rare{border-color:#3b82f6;box-shadow:0 0 4px rgba(59,130,246,.3)}
    .inv-item.epic{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.4)}
    .inv-item.legendary{border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,.5);animation:legendPulse 2s ease infinite;}
    @keyframes legendPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.5)}50%{box-shadow:0 0 14px rgba(255,215,0,.8)}}
    .rarity-dot{position:absolute;bottom:2px;right:2px;width:3px;height:3px;border-radius:50%;}
    .common .rarity-dot{background:#666}.uncommon .rarity-dot{background:#22c55e}
    .rare .rarity-dot{background:#3b82f6}.epic .rarity-dot{background:#a855f7}.legendary .rarity-dot{background:var(--gold)}
    #sell-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;border-radius:4px;cursor:pointer;}
    #sell-btn:active{background:rgba(255,107,53,.15);}

    /* equipment */
    .equip-grid{display:grid;grid-template-areas:". head ." "arm1 body arm2" ". belt ." ". boots .";grid-template-columns:1fr 1fr 1fr;gap:4px;max-width:170px;margin:0 auto;}
    .eq-slot{aspect-ratio:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:17px;cursor:pointer;}
    .eq-slot:active{border-color:var(--accent)}.eq-slot.filled{border-color:var(--gold);background:rgba(255,215,0,.04)}
    .eq-lbl{font-size:6px;color:var(--muted);margin-top:1px;}
    .eq-slot[data-slot="head"]{grid-area:head}.eq-slot[data-slot="body"]{grid-area:body}
    .eq-slot[data-slot="arm1"]{grid-area:arm1}.eq-slot[data-slot="arm2"]{grid-area:arm2}
    .eq-slot[data-slot="belt"]{grid-area:belt}.eq-slot[data-slot="boots"]{grid-area:boots}

    /* spells */
    #spells-list{display:flex;flex-direction:column;gap:4px;}
    .spell-row{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:5px;padding:5px 8px;position:relative;overflow:hidden;}
    .spell-row.locked{opacity:.4;}
    .spell-cd-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);transition:width .1s linear;}
    .spell-ico{font-size:17px;flex-shrink:0;}
    .spell-info{flex:1;min-width:0;}
    .spell-name{font-size:10px;color:var(--accent);}
    .spell-desc{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .spell-meta{font-size:8px;color:var(--gold);text-align:right;min-width:40px;flex-shrink:0;}
    .spell-lock{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);}
    .spell-tag{display:inline-block;font-size:7px;padding:1px 4px;border-radius:3px;margin-top:2px;}
    .tag-active{background:rgba(0,229,255,.12);color:var(--accent);border:1px solid rgba(0,229,255,.25);}
    .tag-passive{background:rgba(255,107,53,.12);color:var(--accent2);border:1px solid rgba(255,107,53,.25);}
    .tag-aoe{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.25);}

    /* toast */
    #item-toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);border-radius:6px;padding:8px 14px;font-size:11px;max-width:260px;width:90%;text-align:center;box-shadow:var(--glow);pointer-events:none;opacity:0;transition:opacity .2s;z-index:99;}
    #item-toast.show{opacity:1;}
    .tt-name{color:var(--accent);font-size:12px;margin-bottom:3px;}
    .tt-rarity{font-size:9px;margin-top:3px;}
    .tt-rarity.common{color:#888}.tt-rarity.uncommon{color:#22c55e}.tt-rarity.rare{color:#3b82f6}.tt-rarity.epic{color:#a855f7}.tt-rarity.legendary{color:var(--gold);}

    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
<div id="app">

  <!-- HUD TOP -->
  <div id="hud-top">
    <div id="hud-title">⬡ GOLEM</div>
    <div id="hud-wave">VAGUE <span id="wave-num">1</span> · <span id="enemy-count">0</span> ☠</div>
    <div id="hud-score"><span id="score-val">0</span><b>SCORE</b></div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-zone">
    <canvas id="gameCanvas"></canvas>
    <div id="bars-overlay">
      <div class="bar-row"><div class="bar-lbl">HP</div><div class="bar-track bar-hp"><div class="bar-fill" id="bar-hp" style="width:100%"></div></div><div class="bar-txt" id="val-hp">100/100</div></div>
      <div class="bar-row"><div class="bar-lbl">MP</div><div class="bar-track bar-mp"><div class="bar-fill" id="bar-mp" style="width:100%"></div></div><div class="bar-txt" id="val-mp">50/50</div></div>
      <div class="bar-row"><div class="bar-lbl">XP</div><div class="bar-track bar-xp"><div class="bar-fill" id="bar-xp" style="width:0%"></div></div><div class="bar-txt" id="val-xp">LVL 1</div></div>
    </div>
    <div id="spell-pips"></div>
    <div id="state-badge">PATROL</div>
    <div id="combat-log"></div>
    <div id="wave-notif"></div>
  </div>

  <!-- BOTTOM FIXED -->
  <div id="bottom-panel">
    <div id="strips">
      <div id="stats-strip">
        <div class="sstat"><div class="sstat-lbl">STR</div><div class="sstat-val" id="s-str">10</div></div>
        <div class="sstat"><div class="sstat-lbl">INT</div><div class="sstat-val" id="s-int">8</div></div>
        <div class="sstat"><div class="sstat-lbl">SPD</div><div class="sstat-val" id="s-spd">5</div></div>
        <div class="sstat"><div class="sstat-lbl">DEF</div><div class="sstat-val" id="s-def">3</div></div>
        <div class="sstat"><div class="sstat-lbl">ATK</div><div class="sstat-val" id="s-atk">12</div></div>
        <div class="sstat"><div class="sstat-lbl">CRIT</div><div class="sstat-val" id="s-crit">5%</div></div>
      </div>
      <div id="gold-row">
        <div id="gold-lbl">⬡ GOLD</div>
        <div id="gold-val">0 G</div>
      </div>
    </div>

    <!-- COLLAPSIBLE DRAWER -->
    <div id="drawer-handle">
      <div id="handle-tabs">
        <div class="htab active" data-tab="inventory"><span class="htab-icon">🎒</span>SACS</div>
        <div class="htab" data-tab="equip"><span class="htab-icon">⚔️</span>ÉQUIP</div>
        <div class="htab" data-tab="spells"><span class="htab-icon">✨</span>SORTS</div>
      </div>
      <div id="handle-toggle">▲</div>
    </div>

    <div id="drawer-wrap" style="height:var(--drawer-expanded)">
      <div id="drawer-content">

        <div class="drawer-panel active" id="panel-inventory">
          <div class="panel-title">⬡ Inventaire (<span id="inv-count">0</span>/24)</div>
          <div id="inv-grid"></div>
          <button id="sell-btn">⟳ AUTO-VENTE COMMUNS</button>
        </div>

        <div class="drawer-panel" id="panel-equip">
          <div class="panel-title">⬡ Équipement</div>
          <div class="equip-grid">
            <div class="eq-slot" data-slot="head">⬡<div class="eq-lbl">TÊTE</div></div>
            <div class="eq-slot" data-slot="body">⬡<div class="eq-lbl">CORPS</div></div>
            <div class="eq-slot" data-slot="arm1">⬡<div class="eq-lbl">BRAS G</div></div>
            <div class="eq-slot" data-slot="arm2">⬡<div class="eq-lbl">BRAS D</div></div>
            <div class="eq-slot" data-slot="belt">⬡<div class="eq-lbl">CEIN.</div></div>
            <div class="eq-slot" data-slot="boots">⬡<div class="eq-lbl">BOTTES</div></div>
          </div>
        </div>

        <div class="drawer-panel" id="panel-spells">
          <div class="panel-title">⬡ Sorts — Tap pour détails</div>
          <div id="spells-list"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="item-toast"><div class="tt-name" id="tt-name"></div><div id="tt-stats"></div><div class="tt-rarity" id="tt-rarity"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  GOLEM.EXE  v1.2 — Collapsible drawer + Spells + Items
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const cZone  = document.getElementById('canvas-zone');

function resizeCanvas(){canvas.width=cZone.clientWidth;canvas.height=cZone.clientHeight;}
window.addEventListener('resize',resizeCanvas); resizeCanvas();

// ── ISO grid ────────────────────────────────────────────────────
const ISO={tileW:48,tileH:24,cols:16,rows:16,toScreen(c,r){return{x:canvas.width/2+(c-r)*this.tileW/2,y:canvas.height*.17+(c+r)*this.tileH/2};}};
const C={golem:{body:'#4a7aff',core:'#00e5ff',joint:'#1a3a8f'},grunt:{body:'#c0392b',eye:'#ff6b35'},brute:{body:'#7d3c98',eye:'#e74c3c'},slime:{body:'#27ae60',eye:'#a9dfbf'},archer:{body:'#e67e22',eye:'#f39c12'},wraith:{body:'#2c3e50',eye:'#9b59b6'},tile:{a:'#0d1f3a',b:'#101e38',line:'#182038'}};

// ── State ───────────────────────────────────────────────────────
const state={
  golem:{col:8,row:8,hp:100,maxHp:100,mp:50,maxMp:50,xp:0,xpNext:100,level:1,str:10,int:8,spd:5,def:3,atkDmg:12,atkSpd:1.2,critChance:5,atkTimer:0,atkRange:1.6,gold:0,gstate:'patrol',fleeTimer:0,target:null,patrol:{col:8,row:8},patrolTimer:0,facing:1,animFrame:0,animTimer:0,hitFlash:0,equipped:{head:null,body:null,arm1:null,arm2:null,belt:null,boots:null}},
  enemies:[],particles:[],inventory:[],
  spells:[],       // populated below
  activeSpells:[], // spells the golem has unlocked
  wave:1,score:0,waveTimer:3,waveDelay:5,waveActive:false,totalKills:0,
};

// ── Spell Definitions ───────────────────────────────────────────
const SPELL_DEFS = [
  // id, name, icon, desc, type, cd(s), mpCost, unlockLvl, effect fn
  {id:'basic',   name:'Frappe Basique', icon:'🔩', desc:'Auto-attaque physique',     type:'passive', cd:0,  mp:0,  lvl:1,  passive:true},
  {id:'slam',    name:'Séisme',         icon:'💥', desc:'Inflige 200% ATK à 1 cible',type:'active',  cd:4,  mp:8,  lvl:1,  aoe:false, dmgMult:2.0,  tag:'active'},
  {id:'shield',  name:'Bouclier',       icon:'🛡️', desc:'+50% DEF pendant 4s',       type:'active',  cd:12, mp:12, lvl:2,  buff:true,  buffStat:'def',buffMult:1.5,buffDur:4, tag:'active'},
  {id:'regen',   name:'Régén. Pierre',  icon:'🌿', desc:'Soigne 15% HP max/tick',    type:'passive', cd:8,  mp:5,  lvl:2,  healPct:.15, tag:'passive'},
  {id:'nova',    name:'Nova de Glace',  icon:'❄️', desc:'Zone — ralentit tous -40%', type:'active',  cd:10, mp:18, lvl:3,  aoe:true, slowPct:.4, slowDur:3, tag:'aoe'},
  {id:'chain',   name:'Éclair Chaîné', icon:'⚡', desc:'Frappe 3 ennemis 120% ATK', type:'active',  cd:7,  mp:14, lvl:3,  chain:3, dmgMult:1.2, tag:'active'},
  {id:'berserker',name:'Berserker',     icon:'🔥', desc:'+80% ATK, -20% DEF 5s',    type:'active',  cd:15, mp:20, lvl:4,  buff:true, tag:'active'},
  {id:'meteor',  name:'Météorite',      icon:'☄️', desc:'Dégâts massifs zone (5×ATK)',type:'active', cd:20, mp:30, lvl:5,  aoe:true, dmgMult:5.0, tag:'aoe'},
  {id:'lifesteal',name:'Vol de Vie',    icon:'🩸', desc:'20% des dégâts soignent HP',type:'passive', cd:0,  mp:0,  lvl:4,  leech:.20, tag:'passive'},
  {id:'critique',name:'Maîtrise Crit.', icon:'🎯', desc:'+25% chance critique passif',type:'passive',cd:0, mp:0,  lvl:3,  critBonus:25, tag:'passive'},
];

// ── Item Pool (expanded) ────────────────────────────────────────
const ITEMS=[

// ── Helpers ─────────────────────────────────────────────────────
function dist(a,b){return Math.sqrt((a.col-b.col)**2+(a.row-b.row)**2);}
function rnd(min,max){return min+Math.random()*(max-min);}

function spawnParticles(x,y,n,color,spd=2,life=.6){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=rnd(.5,spd);state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,size:rnd(1,4)});}
}
function spawnFloat(x,y,text,color){
  const el=document.createElement('div');el.className='float-number';el.style.cssText=`left:${x}px;top:${y}px;color:${color};`;el.textContent=text;cZone.appendChild(el);setTimeout(()=>el.remove(),1150);
}

// ── Combat log ───────────────────────────────────────────────────
const logEl=document.getElementById('combat-log');
const logLines=[];
function addLog(msg,cls=''){logLines.push({msg,cls});if(logLines.length>5)logLines.shift();logEl.innerHTML=logLines.map(l=>`<div class="log-line ${l.cls}">${l.msg}</div>`).join('');}

// ── Wave system ──────────────────────────────────────────────────
const styleEl=document.createElement('style');
styleEl.textContent='@keyframes waveFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}';
document.head.appendChild(styleEl);

function showWaveNotif(t){const el=document.getElementById('wave-notif');el.textContent=t;el.style.animation='none';el.offsetHeight;el.style.animation='waveFlash 2s ease forwards';}

function spawnWave(wave){
  const count=3+wave*2;
  const pools=[
    ['grunt','slime'],
    ['grunt','slime','archer'],
    ['grunt','archer','brute'],
    ['archer','brute','wraith'],
    ['brute','wraith'],
  ];
  const pool=pools[Math.min(wave-1,pools.length-1)];
  for(let i=0;i<count;i++){
    const type=pool[Math.floor(Math.random()*pool.length)];
    const t=ETYPES[type];
    let col,row;const edge=Math.floor(Math.random()*4);
    if(edge===0){col=0;row=rnd(0,ISO.rows);}else if(edge===1){col=ISO.cols-1;row=rnd(0,ISO.rows);}else if(edge===2){col=rnd(0,ISO.cols);row=0;}else{col=rnd(0,ISO.cols);row=ISO.rows-1;}
    const sc=1+wave*.1;
    state.enemies.push({id:Date.now()+i,type,col,row,hp:Math.floor(t.hp*sc),maxHp:Math.floor(t.hp*sc),dmg:Math.floor(t.dmg*sc),spd:t.spd,range:t.range,xp:t.xp,gold:t.gold,threat:t.threat,name:t.name,atkTimer:rnd(0,2),hitFlash:0,animTimer:0,animFrame:0,draw:t.draw,facing:1,slow:0});
  }
  state.waveActive=true;showWaveNotif(`VAGUE ${wave}`);addLog(`⚡ Vague ${wave} — ${count} ennemis!`,'log-warn');
}

// ── Spell system ─────────────────────────────────────────────────
function initSpells(){
  // Start with basic + slam unlocked at level 1
  state.activeSpells=SPELL_DEFS.map(s=>({...s,timer:0,buffTimer:0,active:s.lvl<=1}));
  // Give slam from the start
  renderSpells();
}

function getSpell(id){return state.activeSpells.find(s=>s.id===id);}

function unlockSpell(id){
  const s=state.activeSpells.find(s=>s.id===id);
  if(s&&!s.active){s.active=true;addLog(`✨ Sort débloqué: ${s.name}!`,'log-spell');renderSpells();renderSpellPips();}
}

function learnSpellScroll(spellId){
  // Check if already unlocked
  const s=getSpell(spellId);
  if(!s) return false;
  if(s.active){addLog(`⚠️ Sort ${s.name} déjà connu!`,'log-warn');return false;}
  // Check level requirement
  if(state.golem.level<s.lvl){addLog(`⚠️ Niveau ${s.lvl} requis pour ${s.name}`,'log-warn');return false;}
  unlockSpell(spellId);return true;
}

// update spell cooldowns each frame
function updateSpells(dt){
  const G=state.golem;
  for(const s of state.activeSpells){
    if(!s.active||s.passive||s.cd===0) continue;
    if(s.timer>0) s.timer=Math.max(0,s.timer-dt);
  }
  // Auto-cast active spells when ready + enemies present
  if(state.enemies.length===0) return;
  for(const s of state.activeSpells){
    if(!s.active||s.passive||s.timer>0) continue;
    if(G.mp<s.mp) continue;
    // cast!
    castSpell(s,G);
  }
  // Passive: regen
  const regen=getSpell('regen');
  if(regen?.active&&regen.timer<=0){G.hp=Math.min(G.maxHp,G.hp+G.maxHp*regen.healPct);regen.timer=regen.cd;addLog(`🌿 Régénération: +${Math.floor(G.maxHp*regen.healPct)} HP`,'log-heal');}
}

function castSpell(s,G){
  G.mp=Math.max(0,G.mp-s.mp);
  s.timer=s.cd;
  const nearest=state.enemies.sort((a,b)=>dist(G,a)-dist(G,b));
  const p=ISO.toScreen(G.col,G.row);
  if(s.id==='slam'&&nearest[0]){
    const dmg=Math.floor((G.atkDmg+G.str)*s.dmgMult);
    nearest[0].hp-=dmg;nearest[0].hitFlash=1;
    const ep=ISO.toScreen(nearest[0].col,nearest[0].row);
    spawnParticles(ep.x,ep.y,14,'#ff6b35',4,.8);
    spawnFloat(ep.x,ep.y-20,`💥${dmg}`,'#ff6b35');
    addLog(`💥 Séisme: ${dmg} dégâts sur ${nearest[0].name}`,'log-spell');
    if(nearest[0].hp<=0) killEnemy(nearest[0]);
  } else if(s.id==='shield'){
    G.def=Math.floor(G.def*s.buffMult);s.buffTimer=s.buffDur;
    spawnParticles(p.x,p.y,12,'#3b82f6',2,.8);
    spawnFloat(p.x,p.y-25,'🛡️+DEF','#3b82f6');
    addLog(`🛡️ Bouclier actif ${s.buffDur}s`,'log-spell');
    setTimeout(()=>{G.def=Math.floor(G.def/s.buffMult);addLog('🛡️ Bouclier expiré','log-warn');},s.buffDur*1000);
  } else if(s.id==='nova'){
    for(const e of state.enemies){e.slow=s.slowPct;setTimeout(()=>e.slow=0,s.slowDur*1000);}
    spawnParticles(p.x,p.y,20,'#00e5ff',3,1);
    spawnFloat(p.x,p.y-30,'❄️ZONE','#00e5ff');
    addLog(`❄️ Nova: ${state.enemies.length} ennemis ralentis`,'log-spell');
  } else if(s.id==='chain'&&nearest.length){
    const targets=nearest.slice(0,s.chain);
    for(const t of targets){const dmg=Math.floor((G.atkDmg+G.int)*s.dmgMult);t.hp-=dmg;t.hitFlash=1;const ep=ISO.toScreen(t.col,t.row);spawnFloat(ep.x,ep.y-15,`⚡${dmg}`,'#ffd700');if(t.hp<=0)killEnemy(t);}
    spawnParticles(p.x,p.y,8,'#ffd700',3,.6);
    addLog(`⚡ Éclair: ${targets.length} cibles frappées`,'log-spell');
  } else if(s.id==='berserker'){
    const origAtk=G.atkDmg,origDef=G.def;
    G.atkDmg=Math.floor(G.atkDmg*1.8);G.def=Math.floor(G.def*.8);
    spawnParticles(p.x,p.y,16,'#ff6b35',3,1);
    spawnFloat(p.x,p.y-30,'🔥RAGE','#ff6b35');
    addLog('🔥 Berserker: +80% ATK 5s','log-spell');
    setTimeout(()=>{G.atkDmg=origAtk;G.def=origDef;addLog('🔥 Berserker expiré','log-warn');},5000);
  } else if(s.id==='meteor'&&nearest[0]){
    // AoE around target
    const tx=nearest[0].col,ty=nearest[0].row;
    const aoeEnemies=state.enemies.filter(e=>dist({col:tx,row:ty},e)<2.5);
    const ep=ISO.toScreen(tx,ty);spawnParticles(ep.x,ep.y,25,'#ff4500',5,1.2);
    for(const e of aoeEnemies){const dmg=Math.floor((G.atkDmg+G.int)*s.dmgMult);e.hp-=dmg;e.hitFlash=1;spawnFloat(ISO.toScreen(e.col,e.row).x,ISO.toScreen(e.col,e.row).y-15,`☄️${dmg}`,'#ff4500');if(e.hp<=0)killEnemy(e);}
    addLog(`☄️ Météorite: ${aoeEnemies.length} ennemis touchés`,'log-spell');
  }
  renderSpellPips();
}

// ── Golem AI ─────────────────────────────────────────────────────
function updateGolem(dt){
  const G=state.golem;
  G.animTimer+=dt;if(G.animTimer>.25){G.animTimer=0;G.animFrame=(G.animFrame+1)%4;}
  if(G.hitFlash>0)G.hitFlash-=dt*3;
  // MP regen
  G.mp=Math.min(G.maxMp,G.mp+dt*2);

  const nearby=state.enemies.filter(e=>dist(G,e)<4);
  const threat=nearby.reduce((s,e)=>s+e.threat,0);
  const closest=nearby.sort((a,b)=>dist(G,a)-dist(G,b))[0];
  if(G.hp<G.maxHp*.3&&threat>=3){G.gstate='flee';G.fleeTimer=3;}
  if(G.gstate==='flee'){G.fleeTimer-=dt;if(G.fleeTimer<=0||threat===0)G.gstate='patrol';if(closest)fleeFrom(G,closest,dt);G.hp=Math.min(G.maxHp,G.hp+dt*1.5);}
  else if(threat===0){G.gstate='patrol';patrolBehavior(G,dt);G.hp=Math.min(G.maxHp,G.hp+dt*1);}
  else if(closest&&dist(G,closest)<=G.atkRange){G.gstate='attack';G.target=closest;attackBehavior(G,closest,dt);}
  else if(closest){if(threat<=4){G.gstate='chase';chaseTo(G,closest,dt);}else{G.gstate='flee';G.fleeTimer=2;fleeFrom(G,closest,dt);}}
  G.atkTimer=Math.max(0,G.atkTimer-dt);
  G.col=Math.max(.3,Math.min(ISO.cols-.3,G.col));G.row=Math.max(.3,Math.min(ISO.rows-.3,G.row));
  updateSpells(dt);
  // badge
  const badge=document.getElementById('state-badge');
  const sc={patrol:'#4a7aff',chase:'#ffd700',flee:'#ef4444',attack:'#ff6b35'};
  const labels={patrol:'PATROL',chase:'CHASSE',flee:'FUITE',attack:'ATTAQUE'};
  badge.textContent=labels[G.gstate];badge.style.color=sc[G.gstate];badge.style.borderColor=sc[G.gstate];badge.style.background=sc[G.gstate]+'18';
}

function chaseTo(G,t,dt){const d=dist(G,t);if(d<.1)return;const s=(0.8+G.spd*.08)*dt,f=Math.min(s/d,1);const dc=(t.col-G.col)*f,dr=(t.row-G.row)*f;G.col+=dc;G.row+=dr;if(dc!==0)G.facing=dc>0?1:-1;}
function fleeFrom(G,t,dt){const d=dist(G,t);if(d<.1)return;const s=(1+G.spd*.1)*dt,f=s/d;G.col-=(t.col-G.col)*f;G.row-=(t.row-G.row)*f;G.col+=(8-G.col)*.02;G.row+=(8-G.row)*.02;}
function patrolBehavior(G,dt){G.patrolTimer-=dt;if(G.patrolTimer<=0){G.patrol.col=2+rnd(0,ISO.cols-4);G.patrol.row=2+rnd(0,ISO.rows-4);G.patrolTimer=3+rnd(0,4);}const d=dist(G,G.patrol);if(d>.3){const s=.4*dt,f=Math.min(s/d,1);const dc=(G.patrol.col-G.col)*f,dr=(G.patrol.row-G.row)*f;G.col+=dc;G.row+=dr;if(dc!==0)G.facing=dc>0?1:-1;}}

function attackBehavior(G,enemy,dt){
  if(G.atkTimer<=0){
    G.facing=enemy.col>G.col?1:-1;
    let dmg=G.atkDmg+Math.floor(G.str*.8);
    const crit=Math.random()*100<G.critChance;
    if(crit)dmg=Math.floor(dmg*1.8);
    enemy.hp-=dmg;enemy.hitFlash=1;
    // lifesteal passive
    const ls=getSpell('lifesteal');
    if(ls?.active){const heal=Math.floor(dmg*ls.leech);G.hp=Math.min(G.maxHp,G.hp+heal);}
    const p=ISO.toScreen(enemy.col,enemy.row);
    spawnFloat(p.x,p.y-20,crit?`⚡${dmg}!`:`-${dmg}`,crit?'#ffd700':'#ff6b35');
    spawnParticles(p.x,p.y,crit?10:5,'#ff6b35',3);
    if(crit)addLog(`⚡ CRITIQUE! ${enemy.name} ${dmg}`,'log-dmg');
    G.atkTimer=1/G.atkSpd;
    if(enemy.hp<=0)killEnemy(enemy);
  }
}

function killEnemy(enemy){
  if(!state.enemies.includes(enemy))return;
  const p=ISO.toScreen(enemy.col,enemy.row);
  spawnParticles(p.x,p.y,15,'#ff6b35',4,.8);spawnParticles(p.x,p.y,8,'#ffd700',3,.6);
  state.golem.xp+=enemy.xp;state.golem.gold+=enemy.gold;state.score+=enemy.xp*2;state.totalKills++;
  addLog(`💀 ${enemy.name} +${enemy.xp}XP +${enemy.gold}G`,'log-loot');
  if(Math.random()<.3) dropItem(p.x,p.y);
  state.enemies=state.enemies.filter(e=>e!==enemy);
  checkLevelUp();updateUI();
}

function checkLevelUp(){
  const G=state.golem;
  if(G.xp>=G.xpNext){
    G.level++;G.xp-=G.xpNext;G.xpNext=Math.floor(G.xpNext*1.5);
    G.maxHp+=15;G.hp=G.maxHp;G.maxMp+=5;G.str+=2;G.int+=1;G.def+=1;G.spd+=.3;G.atkDmg+=3;G.atkSpd+=.05;
    addLog(`✨ NIVEAU ${G.level}! Stats améliorées!`,'log-spell');
    const p=ISO.toScreen(G.col,G.row);spawnParticles(p.x,p.y,20,'#00e5ff',4,1);spawnFloat(p.x,p.y-30,`LVL ${G.level}!`,'#00e5ff');
    // auto-unlock spells by level
    for(const s of state.activeSpells){if(!s.active&&s.lvl<=G.level&&s.passive)unlockSpell(s.id);}
    // critique passive
    const cr=getSpell('critique');if(cr?.active)G.critChance=Math.min(60,G.critChance+cr.critBonus);
  }
}

// ── Enemy AI ─────────────────────────────────────────────────────
function updateEnemies(dt){
  const G=state.golem;
  for(const e of state.enemies){
    e.animTimer+=dt;e.atkTimer-=dt;
    if(e.animTimer>.3){e.animTimer=0;e.animFrame=(e.animFrame+1)%4;}
    if(e.hitFlash>0)e.hitFlash-=dt*4;
    const spdMult=e.slow>0?(1-e.slow):1;
    const d=dist(e,G);
    if(d>e.range){const s=e.spd*spdMult*dt,f=Math.min(s/d,1);const dc=(G.col-e.col)*f,dr=(G.row-e.row)*f;e.col+=dc;e.row+=dr;e.facing=dc>0?1:-1;}
    else{e.facing=G.col>e.col?1:-1;if(e.atkTimer<=0){const dmg=Math.max(1,e.dmg-G.def);G.hp-=dmg;G.hitFlash=1;e.atkTimer=1.2/e.spd;const p=ISO.toScreen(G.col,G.row);spawnFloat(p.x,p.y-15,`-${dmg}`,'#ef4444');spawnParticles(p.x,p.y,4,'#ef4444',2);if(G.hp<=0){G.hp=0;handleDeath();}}}
  }
}

function handleDeath(){addLog('💔 Golem tombé… 3s','log-warn');setTimeout(()=>{state.golem.hp=state.golem.maxHp*.5;state.golem.mp=state.golem.maxMp*.5;state.golem.col=8;state.golem.row=8;state.enemies=[];addLog('⚡ Golem ressuscité!','log-spell');},3000);}

// ── Loot ─────────────────────────────────────────────────────────
function dropItem(x,y){
  const roll=Math.random()*100;let rarity='common',acc=0;
  for(const[r,w]of Object.entries(RW)){acc+=w;if(roll<acc){rarity=r;break;}}
  const pool=ITEMS.filter(i=>i.rarity===rarity);if(!pool.length)return;
  const tmpl=pool[Math.floor(Math.random()*pool.length)];
  if(state.inventory.length<24){
    state.inventory.push({...tmpl,uid:Date.now()+Math.random()});
    addLog(`📦 ${tmpl.name} (${rarity})`,'log-loot');
    spawnFloat(x,y-20,tmpl.icon,'#ffd700');
  }
  renderInventory();
}

// ── Particles ─────────────────────────────────────────────────────
function updateParticles(dt){for(let i=state.particles.length-1;i>=0;i--){const p=state.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=dt;if(p.life<=0)state.particles.splice(i,1);}}

// ── Draw helpers ──────────────────────────────────────────────────
function drawShadow(x,y,r=14){ctx.save();ctx.globalAlpha=.28;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x,y+3,r,r*.4,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawHpBar(x,y,hp,max,w=28){const h=3,frac=Math.max(0,hp/max),col=frac>.5?'#22c55e':frac>.25?'#f59e0b':'#ef4444';ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(x-w/2,y-h-1,w,h);ctx.fillStyle=col;ctx.fillRect(x-w/2,y-h-1,w*frac,h);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.5;ctx.strokeRect(x-w/2,y-h-1,w,h);}

// ── Draw: Golem ───────────────────────────────────────────────────
function drawGolem(x,y){
  const G=state.golem;const bob=Math.sin(G.animFrame*Math.PI*.5)*1.2;const flash=G.hitFlash>0;
  ctx.save();ctx.translate(x,y+bob);
  const sc={patrol:'#4a7aff',chase:'#ffd700',flee:'#ef4444',attack:'#ff6b35'};
  ctx.beginPath();ctx.arc(0,-22,16,0,Math.PI*2);ctx.strokeStyle=(sc[G.gstate]||'#fff')+'44';ctx.lineWidth=1.5;ctx.stroke();
  if(flash){ctx.globalAlpha=.5+G.hitFlash*.5;ctx.globalCompositeOperation='lighter';}
  drawShadow(0,6);
  ctx.fillStyle=C.golem.body;ctx.fillRect(-8,-16,16,17);
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(-6,-14,6,8);
  ctx.fillStyle=C.golem.core;ctx.fillRect(-4,-11,8,8);
  ctx.globalAlpha=flash?.5:.55+Math.sin(Date.now()*.003)*.2;ctx.fillStyle='rgba(0,229,255,.45)';ctx.fillRect(-3,-10,6,6);ctx.globalAlpha=flash?.5:1;
  ctx.fillStyle=C.golem.body;ctx.fillRect(-6,-25,12,10);ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(-5,-24,5,4);
  ctx.fillStyle=C.golem.core;ctx.globalAlpha=flash?1:.7+Math.sin(Date.now()*.004)*.3;ctx.fillRect(-4,-20,3,3);ctx.fillRect(1,-20,3,3);ctx.globalAlpha=1;
  const sw=Math.sin(G.animFrame*Math.PI*.5)*1.5;ctx.fillStyle=C.golem.joint;ctx.fillRect(-12,-14+sw,5,11);ctx.fillRect(7,-14-sw,5,11);
  ctx.fillRect(-6,-1,3,5);ctx.fillRect(3,-1,3,5);ctx.fillStyle='#2a5acc';
  ctx.fillRect(-7,3+(G.animFrame%2===0?1:0),5,3);ctx.fillRect(2,3+(G.animFrame%2===0?0:1),5,3);
  ctx.restore();drawHpBar(x,y-32,G.hp,G.maxHp,36);
}

// ── Draw: Grunt ────────────────────────────────────────────────────
function drawGrunt(cx,x,y,e){
  const bob=Math.sin(e.animFrame*Math.PI*.5)*1.2;cx.save();cx.translate(x,y+bob);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  drawShadow(0,5);
  cx.fillStyle=C.grunt.body;cx.fillRect(-7,-17,14,17);cx.fillStyle='#8b1a10';cx.fillRect(-5,-15,5,7);
  cx.fillStyle=C.grunt.eye;cx.globalAlpha=.8+Math.sin(Date.now()*.006)*.2;cx.fillRect(-4,-13,2.5,2.5);cx.fillRect(1,-13,2.5,2.5);cx.globalAlpha=1;
  cx.fillStyle='#7a1208';cx.fillRect(-6,-1+(e.animFrame%2===0?1:0),4,4);cx.fillRect(2,-1+(e.animFrame%2===0?0:1),4,4);
  cx.restore();drawHpBar(x,y-25,e.hp,e.maxHp,28);
}

// ── Draw: Brute ────────────────────────────────────────────────────
function drawBrute(cx,x,y,e){
  const bob=Math.sin(e.animFrame*Math.PI*.5)*.8;cx.save();cx.translate(x,y+bob);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  drawShadow(0,6,20);
  cx.fillStyle=C.brute.body;cx.fillRect(-11,-22,22,21);cx.fillStyle='#5a2880';cx.fillRect(-9,-20,9,10);
  cx.fillStyle=C.brute.eye;cx.globalAlpha=.9+Math.sin(Date.now()*.005)*.1;cx.fillRect(-7,-16,4,4);cx.fillRect(3,-16,4,4);cx.globalAlpha=1;
  cx.fillStyle='#4a1a70';cx.fillRect(-13,-16,4,14);cx.fillRect(9,-16,4,14);cx.fillRect(-8,-1+(e.animFrame%2===0?2:0),5,6);cx.fillRect(3,-1+(e.animFrame%2===0?0:2),5,6);
  cx.restore();drawHpBar(x,y-32,e.hp,e.maxHp,36);
}

// ── Draw: Slime ────────────────────────────────────────────────────
function drawSlime(cx,x,y,e){
  const sq=.85+Math.sin(e.animFrame*Math.PI*.5)*.15;cx.save();cx.translate(x,y);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  cx.scale(1,sq);cx.fillStyle=C.slime.body;cx.beginPath();cx.ellipse(0,-6,10,8,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,.15)';cx.beginPath();cx.ellipse(-2,-9,4,2.5,-.3,0,Math.PI*2);cx.fill();
  cx.fillStyle=C.slime.eye;cx.fillRect(-4,-8,2.5,2.5);cx.fillRect(1,-8,2.5,2.5);
  cx.restore();drawHpBar(x,y-20,e.hp,e.maxHp,24);
}

// ── Draw: Archer ───────────────────────────────────────────────────
function drawArcher(cx,x,y,e){
  const bob=Math.sin(e.animFrame*Math.PI*.5)*1;cx.save();cx.translate(x,y+bob);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  drawShadow(0,4,12);
  cx.fillStyle=C.archer.body;cx.fillRect(-5,-19,10,18);
  cx.fillStyle='#c0611a';cx.fillRect(-3,-17,4,6);
  cx.fillStyle=C.archer.eye;cx.globalAlpha=.9;cx.fillRect(-3,-14,2,2);cx.fillRect(1,-14,2,2);cx.globalAlpha=1;
  // bow
  cx.strokeStyle='#8B4513';cx.lineWidth=1.5;cx.beginPath();cx.arc(8,-12,7,-1.2,1.2);cx.stroke();
  cx.strokeStyle='#ddd';cx.lineWidth=.8;cx.beginPath();cx.moveTo(8,-19);cx.lineTo(8,-5);cx.stroke();
  cx.fillStyle='#c0611a';cx.fillRect(-4,0+(e.animFrame%2===0?1:0),3,5);cx.fillRect(1,0+(e.animFrame%2===0?0:1),3,5);
  cx.restore();drawHpBar(x,y-28,e.hp,e.maxHp,28);
}

// ── Draw: Wraith ────────────────────────────────────────────────────
function drawWraith(cx,x,y,e){
  const float=Math.sin(Date.now()*.002+e.id*.01)*3;cx.save();cx.translate(x,y+float);
  if(e.hitFlash>0){cx.globalAlpha=.5+e.hitFlash*.5;cx.globalCompositeOperation='lighter';}
  cx.globalAlpha=(cx.globalAlpha||1)*.75;
  // cloak
  cx.fillStyle=C.wraith.body;
  cx.beginPath();cx.ellipse(0,-8,9,14,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(100,50,150,.4)';cx.beginPath();cx.ellipse(0,-8,7,12,0,0,Math.PI*2);cx.fill();
  // eyes
  cx.fillStyle=C.wraith.eye;cx.globalAlpha=.8+Math.sin(Date.now()*.007)*.2;
  cx.beginPath();cx.arc(-3,-10,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(3,-10,2,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;
  // wispy trails
  for(let i=0;i<3;i++){cx.globalAlpha=.15-i*.04;cx.fillStyle='#9b59b6';cx.beginPath();cx.ellipse(rnd(-4,4),i*5,4-i,3,0,0,Math.PI*2);cx.fill();}
  cx.globalAlpha=1;cx.restore();
  drawHpBar(x,y-28,e.hp,e.maxHp,28);
}

// ── Draw: Grid + Scene ─────────────────────────────────────────────
function drawGrid(){for(let c=0;c<ISO.cols;c++){for(let r=0;r<ISO.rows;r++){const{x,y}=ISO.toScreen(c,r);const tw=ISO.tileW/2,th=ISO.tileH/2;ctx.beginPath();ctx.moveTo(x,y-th);ctx.lineTo(x+tw,y);ctx.lineTo(x,y+th);ctx.lineTo(x-tw,y);ctx.closePath();ctx.fillStyle=(c+r)%2===0?C.tile.a:C.tile.b;ctx.fill();ctx.strokeStyle=C.tile.line;ctx.lineWidth=.5;ctx.stroke();}}}
function drawParticles(){for(const p of state.particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}ctx.globalAlpha=1;}
function drawScene(){ctx.clearRect(0,0,canvas.width,canvas.height);drawGrid();const G=state.golem;const sprites=[];const gp=ISO.toScreen(G.col,G.row);sprites.push({d:G.col+G.row,fn:()=>drawGolem(gp.x,gp.y)});for(const e of state.enemies){const p=ISO.toScreen(e.col,e.row);sprites.push({d:e.col+e.row,fn:()=>e.draw(ctx,p.x,p.y,e)});}sprites.sort((a,b)=>a.d-b.d);for(const s of sprites)s.fn();drawParticles();}

// ── UI ─────────────────────────────────────────────────────────────
function updateUI(){
  const G=state.golem;
  document.getElementById('bar-hp').style.width=(G.hp/G.maxHp*100)+'%';document.getElementById('val-hp').textContent=Math.ceil(G.hp)+'/'+G.maxHp;
  document.getElementById('bar-mp').style.width=(G.mp/G.maxMp*100)+'%';document.getElementById('val-mp').textContent=Math.ceil(G.mp)+'/'+G.maxMp;
  document.getElementById('bar-xp').style.width=(G.xp/G.xpNext*100)+'%';document.getElementById('val-xp').textContent='LVL '+G.level;
  document.getElementById('gold-val').textContent=G.gold+' G';
  document.getElementById('wave-num').textContent=state.wave;document.getElementById('enemy-count').textContent=state.enemies.length;
  document.getElementById('score-val').textContent=state.score.toLocaleString();
  document.getElementById('s-str').textContent=G.str;document.getElementById('s-int').textContent=G.int;
  document.getElementById('s-spd').textContent=G.spd.toFixed(1);document.getElementById('s-def').textContent=G.def;
  document.getElementById('s-atk').textContent=G.atkDmg;document.getElementById('s-crit').textContent=G.critChance+'%';
}

// ── Spell pips (canvas overlay) ────────────────────────────────────
function renderSpellPips(){
  const container=document.getElementById('spell-pips');
  const active=state.activeSpells.filter(s=>s.active&&!s.passive);
  container.innerHTML=active.map(s=>{
    const pct=s.cd>0?Math.max(0,1-s.timer/s.cd):1;
    const ready=s.timer<=0;
    return `<div class="spell-pip ${ready?'ready':'oncd'}">
      <span>${s.icon}</span>
      <div class="pip-lbl">${ready?'OK':s.timer.toFixed(1)+'s'}</div>
      <div class="pip-cd" style="width:${pct*100}%"></div>
    </div>`;
  }).join('');
}

// ── Spells list (drawer) ────────────────────────────────────────────
function renderSpells(){
  const list=document.getElementById('spells-list');
  const G=state.golem;
  list.innerHTML=state.activeSpells.map(s=>{
    const locked=!s.active;
    const cdPct=s.cd>0?Math.max(0,1-s.timer/s.cd)*100:100;
    const tagCls=s.tag==='aoe'?'tag-aoe':s.tag==='passive'?'tag-passive':'tag-active';
    const tagLabel=s.tag||(s.passive?'passive':'active');
    return `<div class="spell-row ${locked?'locked':''}">
      <div class="spell-ico">${s.icon}</div>
      <div class="spell-info">
        <div class="spell-name">${s.name}${locked?` <span style="font-size:8px;color:var(--muted)">LVL ${s.lvl}</span>`:''}</div>
        <div class="spell-desc">${s.desc}</div>
        <span class="spell-tag ${tagCls}">${tagLabel.toUpperCase()}</span>
      </div>
      <div class="spell-meta">${s.passive?'PASSIF':s.cd?s.cd+'s CD':'-'}<br/><span style="color:var(--accent)">${s.mp?s.mp+' MP':''}</span></div>
      ${locked?'<div class="spell-lock">🔒</div>':''}
      ${!locked&&!s.passive&&s.cd>0?`<div class="spell-cd-bar" style="width:${cdPct}%"></div>`:''}
    </div>`;
  }).join('');
}

// ── Inventory ───────────────────────────────────────────────────────
function renderInventory(){
  const grid=document.getElementById('inv-grid');
  const count=state.inventory.length;
  document.getElementById('inv-count').textContent=count;
  let html='';
  for(let i=0;i<24;i++){
    const item=state.inventory[i];
    if(item){html+=`<div class="inv-item ${item.rarity}" data-idx="${i}">${item.icon}<div class="rarity-dot"></div></div>`;}
    else{html+='<div class="inv-item"></div>';}
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.inv-item[data-idx]').forEach(el=>{
    const item=state.inventory[+el.dataset.idx];if(!item)return;
    el.addEventListener('click',()=>showToast(item));
  });
}

// ── Toast ────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(item){
  const t=document.getElementById('item-toast');
  document.getElementById('tt-name').textContent=item.icon+' '+item.name;
  // if it's a scroll, show spell info
  if(item.spell){
    const spellDef=SPELL_DEFS.find(s=>s.id===item.spell);
    document.getElementById('tt-stats').textContent=spellDef?`Débloque: ${spellDef.name} (LVL ${spellDef.lvl} requis)`:'Parchemin de sort';
    // auto-learn if possible
    if(learnSpellScroll(item.spell)){state.inventory.splice(state.inventory.indexOf(item),1);renderInventory();}
  } else {
    document.getElementById('tt-stats').textContent=Object.entries(item.stats).filter(([,v])=>v!==0).map(([k,v])=>k.toUpperCase()+': '+(v>0?'+':'')+v).join(' · ')||'Aucun bonus';
  }
  const ttR=document.getElementById('tt-rarity');ttR.textContent=item.rarity.toUpperCase();ttR.className='tt-rarity '+item.rarity;
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('sell-btn').addEventListener('click',()=>{
  const sold=state.inventory.filter(i=>i.rarity==='common'&&!i.spell);const g=sold.length*2;
  state.inventory=state.inventory.filter(i=>i.rarity!=='common'||i.spell);
  state.golem.gold+=g;
  addLog('💰 '+sold.length+' communs → +'+g+' G','log-loot');renderInventory();updateUI();
});

// ── Tabs (handle bar) ────────────────────────────────────────────────
document.querySelectorAll('.htab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.htab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.drawer-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    // expand if collapsed
    if(drawerCollapsed) toggleDrawer();
  });
});

// ── Collapse logic ────────────────────────────────────────────────────
let drawerCollapsed=false;
const drawerWrap=document.getElementById('drawer-wrap');
const DRAWER_H=240;

function toggleDrawer(){
  drawerCollapsed=!drawerCollapsed;
  drawerWrap.style.height=drawerCollapsed?'0':DRAWER_H+'px';
  setTimeout(resizeCanvas,370); // re-adapt canvas after transition
}

document.getElementById('handle-toggle').addEventListener('click',toggleDrawer);
// swipe down on handle to collapse
let touchStartY=0;
document.getElementById('drawer-handle').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer-handle').addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy>30&&!drawerCollapsed) toggleDrawer();
  else if(dy<-30&&drawerCollapsed) toggleDrawer();
},{passive:true});

// ── Game Loop ─────────────────────────────────────────────────────────
let lastTime=0,pipTimer=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
  if(!state.waveActive||state.enemies.length===0){
    if(state.waveActive&&state.enemies.length===0){state.waveActive=false;state.waveTimer=state.waveDelay;addLog('✅ Vague '+state.wave+' terminée!','log-spell');state.wave++;}
    state.waveTimer-=dt;if(state.waveTimer<=0&&!state.waveActive)spawnWave(state.wave);
  }
  if(state.golem.hp>0){updateGolem(dt);updateEnemies(dt);}
  updateParticles(dt);drawScene();
  pipTimer+=dt;if(pipTimer>.25){pipTimer=0;renderSpellPips();}
  if(Math.floor(ts/100)!==Math.floor((ts-dt*1000)/100))updateUI();
  requestAnimationFrame(gameLoop);
}

// ── Save/Load ─────────────────────────────────────────────────────────
window.addEventListener('beforeunload',()=>{
  localStorage.setItem('golemExeSave',JSON.stringify({
    golem:{hp:state.golem.hp,maxHp:state.golem.maxHp,mp:state.golem.mp,maxMp:state.golem.maxMp,level:state.golem.level,xp:state.golem.xp,xpNext:state.golem.xpNext,gold:state.golem.gold,str:state.golem.str,int:state.golem.int,spd:state.golem.spd,def:state.golem.def,atkDmg:state.golem.atkDmg,critChance:state.golem.critChance,atkSpd:state.golem.atkSpd},
    wave:state.wave,score:state.score,inventory:state.inventory,
    unlockedSpells:state.activeSpells.filter(s=>s.active).map(s=>s.id),
  }));
});

// ── Init ──────────────────────────────────────────────────────────────
function init(){
  resizeCanvas();
  initSpells();
  renderInventory();updateUI();
  addLog('⬡ GOLEM.EXE v1.2 — En ligne!','log-spell');
  addLog('💡 Tap 🔽 pour réduire le panneau','log-warn');

  const sv=localStorage.getItem('golemExeSave');
  if(sv){try{
    const s=JSON.parse(sv);Object.assign(state.golem,s.golem);
    state.wave=s.wave||1;state.score=s.score||0;state.inventory=s.inventory||[];
    if(s.unlockedSpells){for(const id of s.unlockedSpells){const sp=state.activeSpells.find(x=>x.id===id);if(sp)sp.active=true;}}
    addLog('💾 Partie chargée!','log-spell');renderInventory();renderSpells();
  }catch(e){}}

  requestAnimationFrame(ts=>{lastTime=ts;gameLoop(ts);});
}
init();
</script>
